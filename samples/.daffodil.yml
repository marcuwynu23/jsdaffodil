remotePath: /var/www/myapp
ignoreFile: .scpignore
verbose: false
hosts:
  - name: web-1
    host: 10.0.0.11
    user: deploy
    port: 22
    remotePath: /var/www/myapp
  - name: web-2
    host: 10.0.0.12
    user: deploy
    port: 22
    remotePath: /var/www/myapp
steps:
  - name: Build app
    type: local
    command: npm run build
  - name: Upload dist
    type: transfer
    localPath: dist
    destinationPath: /var/www/myapp
  - name: Restart app
    type: ssh
    command: pm2 restart myapp
watch:
  paths: ["./dist", "./src"]
  repoPath: .
  branch: main
  events: ["commit", "merge", "tag"]
  tags: true
  tagPattern: "^v\\d+\\.\\d+\\.\\d+$"
  interval: 5000
  debounce: 2000
